# Phase 2: Sampling Strategies (18 models)
# QS: Quantile Stratified, QC: Quantile Curriculum, HN: Hard Negative

defaults: &defaults
  data: data/raw/dream_rnn_lentimpra/lentiMPRA.K562.h5
  out: results/noise_resistant
  epochs: 80
  batch_size: 1024
  lr: 0.005
  scheduler: onecycle
  save_every: 10
  loss: mse

# Quantile Stratified Sampler experiments
QS1:
  <<: *defaults
  experiment: QS1_quantile_stratified
  model: dream_rnn_single
  sampler: quantile_stratified
  n_quantiles: 10
  noise_weight: 0.0
  seed: 42

QS2:
  <<: *defaults
  experiment: QS2_quantile_stratified
  model: dream_rnn_single
  sampler: quantile_stratified
  n_quantiles: 10
  noise_weight: 0.0
  seed: 123

QS3:
  <<: *defaults
  experiment: QS3_quantile_stratified
  model: dream_rnn_single
  sampler: quantile_stratified
  n_quantiles: 10
  noise_weight: 0.0
  seed: 456

QS4:
  <<: *defaults
  experiment: QS4_quantile_noise_weighted
  model: dream_rnn_single
  sampler: quantile_noise_weighted
  n_quantiles: 10
  noise_weight: 0.5
  seed: 42

QS5:
  <<: *defaults
  experiment: QS5_quantile_noise_weighted
  model: dream_rnn_single
  sampler: quantile_noise_weighted
  n_quantiles: 10
  noise_weight: 0.5
  seed: 123

QS6:
  <<: *defaults
  experiment: QS6_quantile_noise_weighted
  model: dream_rnn_single
  sampler: quantile_noise_weighted
  n_quantiles: 10
  noise_weight: 0.5
  seed: 456

