# Phase 1: Core Loss Functions (36 models)
# RS: Rank Stability, DH: Distributional Head, CA: Contrastive Anchor, NG: Noise Gated

defaults: &defaults
  data: data/raw/dream_rnn_lentimpra/lentiMPRA.K562.h5
  out: results/noise_resistant
  epochs: 80
  batch_size: 1024
  lr: 0.005
  scheduler: onecycle
  save_every: 10

# Rank Stability experiments
RS1:
  <<: *defaults
  experiment: RS1_bilstm_rank_stability
  model: dream_rnn_single
  loss: rank_stability
  noise_k: 1.0
  sigma: 1.0
  seed: 42

RS2:
  <<: *defaults
  experiment: RS2_bilstm_rank_stability
  model: dream_rnn_single
  loss: rank_stability
  noise_k: 1.0
  sigma: 1.0
  seed: 123

RS3:
