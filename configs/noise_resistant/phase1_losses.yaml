  experiment: RS3_bilstm_rank_stability
  model: dream_rnn_single
  loss: rank_stability
  noise_k: 1.0
  sigma: 1.0
  seed: 456

RS4:
  <<: *defaults
  experiment: RS4_factorized_rank_stability
  model: factorized
  loss: rank_stability
  noise_k: 1.0
  seed: 42

RS5:
  <<: *defaults
  experiment: RS5_factorized_rank_stability
  model: factorized
  loss: rank_stability
  noise_k: 1.0
  seed: 123

RS6:
